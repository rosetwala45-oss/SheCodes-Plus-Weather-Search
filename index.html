<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Meteo App</title>
  </head>
  <body>
    <div class="container">
      <header>
        <form class="search-form" id="search-form">
          <input
            class="search-form-input"
            id="search-form-input"
            type="search"
            placeholder="Enter a city..."
          />
          <input class="search-form-button" type="submit" value="Search" />
        </form>
      </header>
      <main>
        <div class="weather-data-container">
          <div>
            <h1 class="weather-city" id="city">Paris</h1>
            <p class="weather-details">
              <span id="time">Saturday 11:58</span>, <span id="description">moderate rain</span>
              <br />
              Humidity: <strong id="humidity">78%</strong>, Wind:
              <strong id="wind-speed">4.73km/h</strong>
            </p>
          </div>

          <div class="weather-temperature-container">
            <div class="weather-icon" id="icon">🌦️</div>
            <div class="weather-temperature" id="temperature">12</div>
            <div class="weather-unit">°C</div>
          </div>
        </div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/rosetwala45-oss" target="_blank">Mbali Twala</a> is
        <a href="" target="_blank">open-sourced on Github</a> and hosted
        <a href="" target="_blank">on Netlify</a>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
